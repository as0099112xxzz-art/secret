<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
html,body{
margin:0;
padding:0;
min-height:100%;
overflow-x:hidden;
overflow-y:auto;
font-family:Arial;
text-align:center;
color:white;
background:black;
}

/* نجوم */
.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
z-index:0;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* قلوب طايرة */
.heart{
position:fixed;
color:red;
animation:float 6s linear infinite;
z-index:0;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:2;
}

button{
padding:12px 22px;
font-size:18px;
border-radius:12px;
border:none;
background:linear-gradient(45deg, red, pink);
color:white;
cursor:pointer;
box-shadow:0 0 15px red;
margin:8px;
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
}

#content{
display:none;
padding:60px 20px;
position:relative;
z-index:2;
}

#malokaName{
font-size:34px;
color:pink;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 5px pink; }
to{ text-shadow:0 0 25px red; }
}

.typing{
font-size:22px;
width:85%;
margin:auto;
white-space:pre-line;
line-height:1.8;
margin-top:20px;
}

#counter{
font-size:20px;
margin-top:15px;
color:pink;
}

#secretBox{
display:none;
margin-top:25px;
padding:20px;
border:1px solid pink;
border-radius:15px;
background:rgba(0,0,0,0.7);
}

</style>
</head>

<body>

<div id="login">
<h2>اكتب الباسورد ❤️</h2>
<input type="password" id="pass">
<br><br>
<button onclick="checkPass()">دخول</button>
</div>

<div id="content">

<h2 id="malokaName">Maloka ❤️</h2>

<h1>❤️ من يوم 13 نوفمبر 2025 ❤️</h1>

<div id="counter"></div>

<p class="typing" id="text"></p>

<div id="imageContainer"></div>

<br>

<button onclick="showSecret()">رسالة سرية 🔐</button>

<div id="secretBox">
<p>اكتب الكلمة السرية 👀</p>
<input type="text" id="secretInput">
<br><br>
<button onclick="checkSecret()">فتح الرسالة</button>
<p id="secretMessage" style="margin-top:15px;font-size:20px;color:pink;"></p>
</div>

<br>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

/* نجوم */
for(let i=0;i<120;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
star.style.animationDuration=Math.random()*3+1+"s";
document.body.appendChild(star);
}

/* قلوب */
setInterval(function(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*20+15+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},700);

/* الكتابة */
var i=0;
var txt="من يوم ما عرفتك وأنا حاسس إن الدنيا بقت أهدى وأجمل ❤️\n\nكل يوم بيعدي وإنتِ فيه بيأكدلي إني محظوظ.\nوجودك في حياتي فرق معايا في كل حاجة.\n\nأنا بختارك كل يوم 💕";

function checkPass(){
if(document.getElementById("pass").value==="love"){
document.getElementById("login").style.display="none";
document.getElementById("content").style.display="block";

document.getElementById("bgMusic").play();

i=0;
document.getElementById("text").innerHTML="";

document.getElementById("imageContainer").innerHTML=
'<img src="love1.jpg" style="margin-top:30px;max-width:320px;border-radius:20px;box-shadow:0 0 30px red;">';

typeWriter();
startCounter();
}else{
alert("الباسورد غلط 😢");
}
}

function typeWriter(){
if(i<txt.length){
document.getElementById("text").innerHTML+=txt.charAt(i);
i++;
setTimeout(typeWriter,45);
}
}

/* العداد */
function startCounter(){
var startDate=new Date("November 13, 2025 00:00:00").getTime();
setInterval(function(){
var now=new Date().getTime();
var distance=now-startDate;

var days=Math.floor(distance/(1000*60*60*24));
var hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes=Math.floor((distance%(1000*60*60))/(1000*60));
var seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("counter").innerHTML=
"عدّى علينا: "+days+" يوم "+
hours+" ساعة "+
minutes+" دقيقة "+
seconds+" ثانية ❤️";
},1000);
}

/* رسالة سرية */
function showSecret(){
document.getElementById("secretBox").style.display="block";
}

function checkSecret(){
var val=document.getElementById("secretInput").value.toLowerCase();
if(val==="ahmed"){
document.getElementById("secretMessage").innerHTML=
"إنتِ السر الحلو في حياتي ❤️ ومفيش حد هيعرف قد إيه بحبك غير ربنا 💕";
}else{
document.getElementById("secretMessage").innerHTML="حاولي تاني 👀";
}
}

</script>

</body>
</html>
