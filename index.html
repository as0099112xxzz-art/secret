<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
margin:0;
padding:0;
background:radial-gradient(circle at top,#300000,black);
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input,textarea{
padding:10px;
border-radius:10px;
border:none;
width:80%;
max-width:350px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,red,pink);
color:white;
cursor:pointer;
margin-top:10px;
}

#content{display:none;padding:20px;}

.card{
width:250px;
height:150px;
margin:20px auto;
perspective:1000px;
}

.card-inner{
position:relative;
width:100%;
height:100%;
transition:transform 0.8s;
transform-style:preserve-3d;
}

.card:hover .card-inner{
transform:rotateY(180deg);
}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,0,0,0.2);
box-shadow:0 0 15px red;
padding:10px;
}

.card-back{
transform:rotateY(180deg);
background:rgba(255,105,180,0.3);
}

.heart,.star{
position:fixed;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

#secretOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;
text-align:center;
padding:20px;
}

#surpriseBtn{
display:none;
margin-top:20px;
}

</style>
</head>

<body>

<div id="login">
<h2>اكتب الباسورد ❤️</h2>
<input type="password" id="pass">
<br><br>
<button onclick="checkPass()">دخول</button>
</div>

<div id="content">

<h1>❤️ Maloka ❤️</h1>

<img src="love1.jpg" style="max-width:300px;border-radius:20px;box-shadow:0 0 20px red;">

<h3 id="counter"></h3>
<h3 id="yearCounter" style="color:gold;"></h3>

<p id="text" style="font-size:20px;width:85%;margin:auto;white-space:pre-line;line-height:1.8;margin-top:20px;"></p>

<h2>🃏 دوسي على الكروت</h2>

<div class="card">
<div class="card-inner">
<div class="card-front">اضغطي هنا ❤️</div>
<div class="card-back">محبيتش ولا هحب حد قدك</div>
</div>
</div>

<h2>📸 ذكرياتنا</h2>

<img src="memory1.jpg" style="width:80%;max-width:300px;border-radius:15px;margin:10px;">
<img src="memory2.jpg" style="width:80%;max-width:300px;border-radius:15px;margin:10px;">
<img src="memory3.jpg" style="width:80%;max-width:300px;border-radius:15px;margin:10px;">

<h2>💌 رسالة سرية</h2>

<input type="text" id="secretInput" placeholder="اكتب الاسم">
<br>
<button onclick="checkSecret()">افتح الرسالة</button>

<br><br>

<h2>💬 اكتبيلي رأيك هنا</h2>
<textarea id="reply"></textarea>
<br>
<button onclick="sendWhats()">ابعتيلي رأيك</button>

<button id="surpriseBtn" onclick="alert('أنا بختارك كل يوم ❤️')">
عندي مفاجأة ليكي 🎁
</button>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<audio id="secretSound">
<source src="secret.mp3" type="audio/mpeg">
</audio>

</div>

<div id="secretOverlay">
<h1>أنا محبيتش ولا هحب حد قدك ❤️</h1>
<p>وجودك في حياتي أحلى حاجة حصلتلي 💕</p>
</div>

<script>

var i=0;
var txt=
"من يوم ما عرفتك وأنا حاسس إن الدنيا بقت أهدى وأجمل ❤️\n"+
"كل يوم بيعدي وإنتِ فيه بيأكدلي إني محظوظ 💕\n\n"+
"ومهما يعدي وقت...\n"+
"أنا بختارك كل يوم من غير تردد ❤️\n"+
"ومحبيتش ولا هحب حد قدك.";

function checkPass(){
if(document.getElementById("pass").value==="love"){
document.getElementById("login").style.display="none";
document.getElementById("content").style.display="block";
document.getElementById("bgMusic").play();
startCounter();
startYearCounter();
typeWriter();
createEffects();
setTimeout(()=>{document.getElementById("surpriseBtn").style.display="block";},30000);
}else{alert("الباسورد غلط");}
}

function typeWriter(){
if(i<txt.length){
document.getElementById("text").innerHTML+=txt.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

function startCounter(){
var start=new Date("Nov 13, 2025 00:00:00").getTime();
setInterval(()=>{
var now=new Date().getTime();
var d=now-start;
var days=Math.floor(d/(1000*60*60*24));
var hours=Math.floor((d%(1000*60*60*24))/(1000*60*60));
var minutes=Math.floor((d%(1000*60*60))/(1000*60));
var seconds=Math.floor((d%(1000*60))/1000);
document.getElementById("counter").innerHTML=
"عدّى علينا: "+days+" يوم "+hours+" ساعة "+minutes+" دقيقة "+seconds+" ثانية ❤️";
},1000);
}

function startYearCounter(){
var end=new Date("Nov 13, 2026 00:00:00").getTime();
setInterval(()=>{
var now=new Date().getTime();
var d=end-now;
var days=Math.floor(d/(1000*60*60*24));
document.getElementById("yearCounter").innerHTML=
"🎉 باقي على أول سنة: "+days+" يوم ❤️";
},1000);
}

function checkSecret(){
if(document.getElementById("secretInput").value==="احمد"){
document.getElementById("secretOverlay").style.display="flex";
document.getElementById("secretSound").play();
for(let i=0;i<40;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=Math.random()*30+20+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
}
setTimeout(()=>{document.getElementById("secretOverlay").style.display="none";},5000);
}else{
alert("جرب تكتب الاسم صح 👀");
}
}

function createEffects(){
setInterval(()=>{
let s=document.createElement("div");
s.className="star";
s.innerHTML="⭐";
s.style.left=Math.random()*100+"vw";
document.body.appendChild(s);
setTimeout(()=>s.remove(),6000);
},800);
}

function sendWhats(){
let msg=document.getElementById("reply").value;
if(!msg){alert("اكتبي حاجة الأول");return;}
window.open("https://wa.me/8615268691947?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
