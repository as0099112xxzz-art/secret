<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
margin:0;
padding:0;
background:radial-gradient(circle at top, #1a0000, #000);
color:white;
font-family:Arial;
text-align:center;
overflow-y:auto;
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input, textarea{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
width:80%;
max-width:350px;
}

button{
padding:12px 22px;
font-size:18px;
border-radius:12px;
border:none;
background:linear-gradient(45deg, red, pink);
color:white;
cursor:pointer;
box-shadow:0 0 15px red;
margin-top:10px;
}

#content{
display:none;
padding:30px 10px;
}

.typing{
font-size:22px;
width:85%;
margin:auto;
white-space:pre-line;
line-height:1.8;
margin-top:20px;
}

#counter{
font-size:20px;
margin-top:15px;
color:pink;
}

.heart,.star{
position:fixed;
animation:float 8s linear infinite;
pointer-events:none;
}

.star{
color:white;
font-size:10px;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
10%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:30px;
}

.card{
width:150px;
background:rgba(255,0,0,0.15);
padding:15px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.card:hover{transform:scale(1.05)}
.hiddenText{display:none;margin-top:10px}

.memory img{
width:100%;
border-radius:12px;
}
</style>
</head>

<body>

<div id="login">
<h2>اكتب الباسورد ❤️</h2>
<input type="password" id="pass">
<br><br>
<button onclick="checkPass()">دخول</button>
</div>

<div id="content">

<h1 id="nameTitle"></h1>

<img src="love1.jpg" style="max-width:300px;border-radius:20px;box-shadow:0 0 20px red;">

<div id="counter"></div>

<p class="typing" id="text"></p>

<h2>🧠 كلمات من قلبي</h2>
<div class="cards">
<div class="card" onclick="toggle(this)">محبّتش<span class="hiddenText">ولا هحب</span></div>
<div class="card" onclick="toggle(this)">حد<span class="hiddenText">قدك</span></div>
<div class="card" onclick="toggle(this)">إنتي<span class="hiddenText">اختياري</span></div>
</div>

<h2>📸 ذكرياتنا</h2>
<div class="cards">
<div class="card memory">
<img src="memory1.jpg">
<p>أول صورة ❤️</p>
</div>
<div class="card memory">
<img src="memory2.jpg">
<p>أول ضحكة 😂</p>
</div>
<div class="card memory">
<img src="memory3.jpg">
<p>أول اعتراف 💌</p>
</div>
</div>

<h2>💬 اكتبيلي رأيك هنا</h2>
<textarea id="reply" placeholder="اكتبي اللي في قلبك ❤️"></textarea><br>
<button onclick="sendWhats()">إبعت ❤️</button>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>
function checkPass(){
if(pass.value==="love"){
login.style.display="none";
content.style.display="block";
bgMusic.play();
nameTitle.innerText="Maloka ❤️";
typeWriter();
startCounter();
createBG();
}else alert("غلط 😢");
}

var txt="من يوم ما عرفتك وأنا حاسس إن الدنيا بقت أهدى وأجمل ❤️\n\nكل يوم بيعدي وإنتِ فيه بيأكدلي إني محظوظ.\n\nأنا بختارك كل يوم.";
var i=0;
function typeWriter(){
if(i<txt.length){
text.innerHTML+=txt.charAt(i++);
setTimeout(typeWriter,40);
}
}

function startCounter(){
var start=new Date("November 13, 2025").getTime();
setInterval(()=>{
var now=new Date().getTime();
var d=now-start;
counter.innerHTML=`عدّى علينا ${Math.floor(d/86400000)} يوم ❤️`;
},1000);
}

function toggle(el){
el.querySelector(".hiddenText").style.display="block";
}

function createBG(){
setInterval(()=>{
let h=document.createElement("div");
h.className=Math.random()>0.5?"heart":"star";
h.innerHTML=Math.random()>0.5?"❤️":"✦";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=Math.random()*20+10+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
},400);
}

function sendWhats(){
let msg=encodeURIComponent(reply.value);
window.open("https://wa.me/8615268691947?text="+msg,"_blank");
}
</script>

</body>
</html>
