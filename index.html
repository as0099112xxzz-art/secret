<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
margin:0;
padding:0;
background:radial-gradient(circle at top, #2b0000, black);
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input, textarea{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
width:80%;
max-width:350px;
}

button{
padding:12px 22px;
font-size:18px;
border-radius:12px;
border:none;
background:linear-gradient(45deg, red, pink);
color:white;
cursor:pointer;
box-shadow:0 0 15px red;
margin-top:10px;
}

#content{
display:none;
padding-top:30px;
}

h1,h2{
color:pink;
}

.typing{
font-size:22px;
width:85%;
margin:auto;
white-space:pre-line;
line-height:1.8;
margin-top:20px;
}

#counter{
font-size:20px;
margin-top:15px;
color:pink;
}

.heart,.star{
position:absolute;
animation:float 7s linear infinite;
}

.star{
color:#ffd700;
font-size:12px;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

.card{
background:rgba(255,0,0,0.15);
margin:15px auto;
padding:15px;
border-radius:15px;
width:85%;
max-width:320px;
box-shadow:0 0 15px red;
cursor:pointer;
}

.card span{
display:none;
margin-top:10px;
font-size:18px;
}

textarea{
margin-top:10px;
height:100px;
}

</style>
</head>

<body>

<div id="login">
<h2>اكتب الباسورد ❤️</h2>
<input type="password" id="pass" placeholder="الباسورد هنا">
<br><br>
<button onclick="checkPass()">دخول</button>
</div>

<div id="content">

<h1 id="nameTitle"></h1>

<img src="love1.jpg" style="max-width:300px;border-radius:20px;box-shadow:0 0 25px red;margin-top:15px;">

<div id="counter"></div>

<p class="typing" id="text"></p>

<h2>🃏 دوسي على الكروت</h2>

<div class="card" onclick="showText(this)">
كارت 1
<span>محبيتش</span>
</div>

<div class="card" onclick="showText(this)">
كارت 2
<span>ولا هحب</span>
</div>

<div class="card" onclick="showText(this)">
كارت 3
<span>حد قدك ❤️</span>
</div>

<h2>📸 ذكرياتنا</h2>

<div class="card">
<img src="memory1.jpg" style="width:100%;border-radius:12px;">
<p>أول صورة لينا ❤️</p>
</div>

<div class="card">
<img src="memory2.jpg" style="width:100%;border-radius:12px;">
<p>أكتر يوم ضحكنا فيه 😂</p>
</div>

<div class="card">
<img src="memory3.jpg" style="width:100%;border-radius:12px;">
<p>أول اعتراف 💌</p>
</div>

<h2>💬 اكتبيلي رأيك هنا</h2>

<textarea id="reply" placeholder="اكتبي اللي في قلبك هنا ❤️"></textarea>
<br>
<button onclick="sendWhats()">ابعتيلي رأيك</button>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function checkPass(){
if(document.getElementById("pass").value === "love"){
document.getElementById("login").style.display="none";
document.getElementById("content").style.display="block";
document.getElementById("bgMusic").play();
askName();
typeWriter();
createHearts();
startCounter();
}else{
alert("الباسورد غلط 😢");
}
}

function askName(){
let name = prompt("اكتبي اسمك ❤️");
if(name){
document.getElementById("nameTitle").innerText = "❤️ " + name + " ❤️";
alert("عندي رسالة سرية ليكي 💌\nأنا محبيتش ولا هحب حد قدك");
}
}

var i=0;
var txt="من يوم ما عرفتك وأنا بختارك كل يوم...\nومهما يعدي وقت قلبي ثابت عليك ❤️";

function typeWriter(){
if(i<txt.length){
document.getElementById("text").innerHTML+=txt.charAt(i);
i++;
setTimeout(typeWriter,45);
}
}

function startCounter(){
var startDate=new Date("November 13, 2025 00:00:00").getTime();
setInterval(function(){
var now=new Date().getTime();
var d=now-startDate;
var days=Math.floor(d/(1000*60*60*24));
document.getElementById("counter").innerHTML="عدّى علينا "+days+" يوم ❤️";
},1000);
}

function createHearts(){
setInterval(function(){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=Math.random()*20+20+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),7000);
},500);

setInterval(function(){
let s=document.createElement("div");
s.className="star";
s.innerHTML="⭐";
s.style.left=Math.random()*100+"vw";
document.body.appendChild(s);
setTimeout(()=>s.remove(),7000);
},800);
}

function showText(card){
card.querySelector("span").style.display="block";
}

function sendWhats(){
let msg=document.getElementById("reply").value;
if(!msg){alert("اكتبي حاجة الأول ❤️");return;}
let phone="8615268691947";
let url="https://wa.me/"+phone+"?text="+encodeURIComponent(msg);
window.open(url,"_blank");
}

</script>

</body>
</html>
