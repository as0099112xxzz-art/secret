<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
margin:0;
padding:0;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;

/* خلفية متحركة */
background:linear-gradient(-45deg,#000000,#1a001a,#330033,#000000);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
}

button{
padding:12px 22px;
font-size:18px;
border-radius:12px;
border:none;
background:linear-gradient(45deg, red, pink);
color:white;
cursor:pointer;
box-shadow:0 0 15px red;
margin:8px;
}

#content{
display:none;
padding-top:50px;
}

#malokaName{
font-size:32px;
color:pink;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 5px pink; }
to{ text-shadow:0 0 25px red; }
}

.typing{
font-size:22px;
width:85%;
margin:auto;
white-space:pre-line;
line-height:1.8;
margin-top:20px;
}

#counter{
font-size:20px;
margin-top:15px;
color:pink;
}

/* الرسالة السرية */
#secretBox{
display:none;
margin-top:20px;
padding:20px;
border:1px solid pink;
border-radius:15px;
background:rgba(0,0,0,0.7);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>

<body>

<div id="login">
<h2>اكتب الباسورد ❤️</h2>
<input type="password" id="pass">
<br><br>
<button onclick="checkPass()">دخول</button>
</div>

<div id="content">

<h2 id="malokaName">Maloka ❤️</h2>

<h1>❤️ من يوم 13 نوفمبر 2025 ❤️</h1>

<div id="counter"></div>

<p class="typing" id="text"></p>

<br>

<button onclick="showSecret()">رسالة سرية 🔐</button>

<div id="secretBox">
<p>اكتب الكلمة السرية 👀</p>
<input type="text" id="secretInput">
<br><br>
<button onclick="checkSecret()">فتح الرسالة</button>
<p id="secretMessage" style="margin-top:15px;font-size:20px;color:pink;"></p>
</div>

</div>

<script>

var i=0;
var txt="من يوم ما عرفتك وأنا حاسس إن الدنيا بقت أهدى وأجمل ❤️\n\nكل يوم بيعدي وإنتِ فيه بيأكدلي إني محظوظ.\nوجودك في حياتي فرق معايا في كل حاجة.\n\nأنا بختارك كل يوم 💕";

function checkPass(){
if(document.getElementById("pass").value==="love"){
document.getElementById("login").style.display="none";
document.getElementById("content").style.display="block";
i=0;
document.getElementById("text").innerHTML="";
typeWriter();
startCounter();
}
}

function typeWriter(){
if(i<txt.length){
document.getElementById("text").innerHTML+=txt.charAt(i);
i++;
setTimeout(typeWriter,45);
}
}

function startCounter(){
var startDate=new Date("November 13, 2025 00:00:00").getTime();
setInterval(function(){
var now=new Date().getTime();
var distance=now-startDate;

var days=Math.floor(distance/(1000*60*60*24));
var hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes=Math.floor((distance%(1000*60*60))/(1000*60));
var seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("counter").innerHTML=
"عدّى علينا: "+days+" يوم "+
hours+" ساعة "+
minutes+" دقيقة "+
seconds+" ثانية ❤️";
},1000);
}

/* رسالة سرية */
function showSecret(){
document.getElementById("secretBox").style.display="block";
}

function checkSecret(){
var val=document.getElementById("secretInput").value.toLowerCase();

if(val==="ahmed"){
document.getElementById("secretMessage").innerHTML=
"إنتِ السر الحلو في حياتي ❤️ ومفيش حد هيعرف قد إيه بحبك غير ربنا 💕";
}else{
document.getElementById("secretMessage").innerHTML="حاولي تاني 👀";
}
}

</script>

</body>
</html>
