<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed ❤️</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);
background-size:400% 400%;
animation:bg 10s ease infinite;
overflow-x:hidden;
color:#fff;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{margin-top:20px}

img.top-img{
width:220px;
border-radius:20px;
box-shadow:0 0 20px #fff;
margin:20px 0;
}

#countdown{
font-size:20px;
margin:20px 0;
}

.section{
margin:30px 0;
}

.card{
width:250px;
height:200px;
margin:20px auto;
perspective:1000px;
cursor:pointer;
}

.card-inner{
position:relative;
width:100%;
height:100%;
transition:transform 0.8s;
transform-style:preserve-3d;
}

.card.flipped .card-inner{
transform:rotateY(180deg);
}

.card-front, .card-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.card-front{
background:#ffffff22;
}

.card-back{
background:#ff4b5c;
transform:rotateY(180deg);
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4b5c;
color:white;
font-size:16px;
cursor:pointer;
}

input{
padding:8px;
border-radius:10px;
border:none;
margin-top:10px;
}

.secret{
display:none;
margin-top:20px;
font-size:18px;
color:yellow;
}

.floating{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.floating span{
position:absolute;
font-size:20px;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<h1>❤️ بحبك ❤️</h1>

<img src="love1.jpg" class="top-img">

<div id="countdown"></div>

<!-- الجمل -->
<div class="section">
<h2>💌 كلام ليكي</h2>

<div class="card" onclick="flipCard(this)">
<div class="card-inner">
<div class="card-front">اضغطي هنا</div>
<div class="card-back">انتي اجمل حاجة حصلتلي ❤️</div>
</div>
</div>

<div class="card" onclick="flipCard(this)">
<div class="card-inner">
<div class="card-front">اضغطي هنا</div>
<div class="card-back">ضحكتك بالدنيا كلها 💕</div>
</div>
</div>
</div>

<!-- الذكريات -->
<div class="section">
<h2>📸 ذكرياتنا</h2>

<div class="card" onclick="flipCard(this)">
<div class="card-inner">
<div class="card-front">
<img src="memory1.jpg" style="width:100%;height:100%;border-radius:15px;">
</div>
<div class="card-back">أول صورة لينا وكانت بداية كل حاجة ❤️</div>
</div>
</div>

<div class="card" onclick="flipCard(this)">
<div class="card-inner">
<div class="card-front">
<img src="memory2.jpg" style="width:100%;height:100%;border-radius:15px;">
</div>
<div class="card-back">اليوم اللي ضحكنا فيه جامد 😂💕</div>
</div>
</div>

<div class="card" onclick="flipCard(this)">
<div class="card-inner">
<div class="card-front">
<img src="memory3.jpg" style="width:100%;height:100%;border-radius:15px;">
</div>
<div class="card-back">أول مرة قولتلك بحبك ❤️</div>
</div>
</div>
</div>

<!-- الرسالة السرية -->
<div class="section">
<h2>🔐 رسالة سرية</h2>
<input type="text" id="secretInput" placeholder="اكتبي الاسم">
<br>
<button onclick="checkName()">عرض الرسالة</button>

<div class="secret" id="secretMessage">
انتي كل حياتي يا أجمل بنت في الدنيا ❤️🔥
</div>
</div>

<!-- واتس -->
<div class="section">
<h2>💬 اكتبيلي رأيك هنا</h2>
<textarea id="whatsappMsg" rows="3" cols="25" placeholder="اكتبي رسالتك هنا"></textarea>
<br><br>
<button onclick="sendWhats()">ابعتلي ع الواتس</button>
</div>

<!-- موسيقى -->
<audio autoplay loop>
<source src="music1.mp3" type="audio/mp3">
</audio>

<!-- قلوب ونجوم -->
<div class="floating" id="floating"></div>

<script>
function flipCard(card){
card.classList.toggle("flipped");
explodeHearts();
}

function checkName(){
let name=document.getElementById("secretInput").value;
if(name.trim()=="احمد"){
document.getElementById("secretMessage").style.display="block";
}
}

function sendWhats(){
let msg=document.getElementById("whatsappMsg").value;
let number="8615268691947";
window.open("https://wa.me/"+number+"?text="+encodeURIComponent(msg));
}

let startDate=new Date("2024-01-01 00:00:00");
function updateCountdown(){
let now=new Date();
let diff=now-startDate;

let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let minutes=Math.floor((diff%(1000*60*60))/(1000*60));
let seconds=Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
"مع بعض بقالنا: "+days+" يوم "+hours+" ساعة "+minutes+" دقيقة "+seconds+" ثانية ❤️";
}
setInterval(updateCountdown,1000);

function createFloating(){
let container=document.getElementById("floating");
for(let i=0;i<20;i++){
let span=document.createElement("span");
span.innerHTML=Math.random()>0.5?"❤️":"⭐";
span.style.left=Math.random()*100+"%";
span.style.animationDuration=(5+Math.random()*5)+"s";
container.appendChild(span);
}
}
createFloating();

function explodeHearts(){
for(let i=0;i<10;i++){
let heart=document.createElement("span");
heart.innerHTML="💖";
heart.style.position="fixed";
heart.style.left=Math.random()*100+"%";
heart.style.top=Math.random()*100+"%";
heart.style.fontSize="20px";
heart.style.animation="float 2s linear forwards";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),2000);
}
}
</script>

</body>
</html>
