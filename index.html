<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
margin:0;
padding:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

/* نجوم */
.star{
position:fixed;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* اهتزاز */
.shake{
animation:shake 0.5s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-10px);}
50%{transform:translateX(10px);}
75%{transform:translateX(-10px);}
100%{transform:translateX(0);}
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
}

button{
padding:10px 20px;
border-radius:10px;
border:none;
background:red;
color:white;
cursor:pointer;
margin-top:10px;
}

#content{display:none;padding-top:40px;}

#malokaName{
opacity:0;
transition:1.5s;
color:pink;
font-size:30px;
}

#counter,#yearCounter{
margin-top:10px;
color:pink;
}

.card{
display:inline-block;
background:#111;
padding:20px;
margin:10px;
cursor:pointer;
border-radius:10px;
box-shadow:0 0 10px red;
}

#secretBox{
display:none;
background:black;
padding:20px;
margin-top:20px;
border:1px solid red;
}
</style>
</head>

<body>

<div id="login">
<h2>اكتب الباسورد ❤️</h2>
<input type="password" id="pass">
<br>
<button onclick="checkPass()">دخول</button>
</div>

<div id="content">

<h2 id="malokaName">Maloka ❤️</h2>
<h1>❤️ من يوم 13 نوفمبر 2025 ❤️</h1>

<div id="counter"></div>
<div id="yearCounter"></div>

<p id="text"></p>

<div>
<div class="card" onclick="showWord(this)">❤️</div>
<div class="card" onclick="showWord(this)">💕</div>
<div class="card" onclick="showWord(this)">💖</div>
<div class="card" onclick="showWord(this)">💘</div>
<div class="card" onclick="showWord(this)">💞</div>
<div class="card" onclick="showWord(this)">💗</div>
</div>

<p id="cardsMessage"></p>

<button onclick="openSecret()">رسالة مخبية 👀</button>

<div id="secretBox">
<p>اكتب اسم حبيبك 👀</p>
<input type="text" id="secretInput">
<br>
<button onclick="checkSecret()">فتح الرسالة</button>
<p id="secretMessage"></p>
</div>

<br>

<a href="https://wa.me/8615268691947?text=Maloka%20❤️%20شوفت%20الموقع%20ومش%20مصدقة%20قد%20إيه%20حبيته%20😭❤️%20إنت%20أجمل%20حاجة%20حصلتلي%20💕" target="_blank">
<button>ابعتيلي ردك ❤️</button>
</a>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

/* نجوم */
for(let i=0;i<150;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
star.style.animationDuration=Math.random()*3+1+"s";
document.body.appendChild(star);
}

function checkPass(){
if(document.getElementById("pass").value==="love"){
login.style.display="none";
content.style.display="block";
malokaName.style.opacity="1";
bgMusic.play();
startCounter();
startYearCounter();
}
}

function startCounter(){
var start=new Date("November 13, 2025").getTime();
setInterval(function(){
var now=new Date().getTime();
var d=now-start;
var days=Math.floor(d/(1000*60*60*24));
var hours=Math.floor((d%(1000*60*60*24))/(1000*60*60));
var minutes=Math.floor((d%(1000*60*60))/(1000*60));
var seconds=Math.floor((d%(1000*60))/1000);
counter.innerHTML="عدّى علينا: "+days+" يوم "+hours+" ساعة "+minutes+" دقيقة "+seconds+" ثانية ❤️";
},1000);
}

function startYearCounter(){
var target=new Date("November 13, 2026").getTime();
setInterval(function(){
var now=new Date().getTime();
var d=target-now;
var days=Math.floor(d/(1000*60*60*24));
yearCounter.innerHTML="باقي على أول سنة لينا: "+days+" يوم ❤️";
},1000);
}

var words=["محبيتش","ولا","هحب","حد","قدك","❤️"];
var i=0;

function showWord(card){
if(i<words.length){
cardsMessage.innerHTML+=words[i]+" ";
card.style.display="none";
i++;
if(i===words.length){
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),500);
}
}
}

function openSecret(){
secretBox.style.display="block";
}

function checkSecret(){
if(secretInput.value.toLowerCase()==="ahmed"){
secretMessage.innerHTML="إنتي عارفة إني بموت فيكي ❤️";
}else{
secretMessage.innerHTML="حاولي تاني 👀";
}
}

</script>

</body>
</html>
